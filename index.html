<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ГДЗ — Решение</title>

  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    /* ── Design tokens ─────────────────────────────────────── */
    :root {
      --bg:        #0d0f14;
      --surface:   #161a23;
      --surface2:  #1e2330;
      --border:    #2a3040;
      --accent:    #6ee7b7;
      --accent2:   #38bdf8;
      --accent3:   #a78bfa;
      --text:      #e8eaf0;
      --muted:     #8892a4;
      --danger:    #f87171;
      --radius:    16px;
      --font-body: 'Literata', Georgia, serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-ui:   'Sora', system-ui, sans-serif;
    }

    @import url('https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,600;1,400&family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: 0 0 40px;
      overflow-x: hidden;
    }

    /* ── Header ────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: rgba(13,15,20,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .subject-badge {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent);
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    header h1 {
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      flex: 1;
    }

    /* ── Main content ──────────────────────────────────────── */
    main {
      padding: 24px 20px 0;
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── Section labels ────────────────────────────────────── */
    .section-label {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Steps ─────────────────────────────────────────────── */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 24px;
      position: relative;
    }

    .steps::before {
      content: '';
      position: absolute;
      left: 19px;
      top: 28px;
      bottom: 28px;
      width: 2px;
      background: linear-gradient(to bottom, var(--accent), var(--accent2), var(--accent3));
      opacity: 0.35;
      border-radius: 2px;
    }

    .step {
      display: flex;
      gap: 16px;
      padding: 16px 0;
      opacity: 0;
      transform: translateY(12px);
      animation: step-in 0.45s ease forwards;
    }

    @keyframes step-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .step-num {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      position: relative;
      z-index: 1;
    }

    .step-body {
      flex: 1;
      padding-top: 9px;
    }

    .step-text {
      font-size: 15px;
      line-height: 1.65;
      color: var(--text);
    }

    .step-formula {
      margin-top: 10px;
      padding: 10px 16px;
      background: var(--surface);
      border-left: 3px solid var(--accent2);
      border-radius: 8px;
      overflow-x: auto;
      font-size: 15px;
    }

    /* ── Answer card ───────────────────────────────────────── */
    .answer-card {
      background: linear-gradient(135deg, #1a3a2a 0%, #162535 100%);
      border: 1px solid rgba(110, 231, 183, 0.25);
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fade-up 0.5s 0.2s ease forwards;
    }

    .answer-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(110,231,183,0.12), transparent 70%);
      pointer-events: none;
    }

    .answer-card .section-label { color: var(--accent); }

    .answer-value {
      font-family: var(--font-ui);
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.4;
      margin-top: 4px;
    }

    /* ── Hint card ─────────────────────────────────────────── */
    .hint-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      opacity: 0;
      animation: fade-up 0.5s 0.35s ease forwards;
    }

    .hint-icon {
      font-size: 22px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .hint-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Error state ───────────────────────────────────────── */
    .error-box {
      text-align: center;
      padding: 48px 24px;
    }

    .error-icon { font-size: 48px; margin-bottom: 16px; }

    .error-text {
      font-family: var(--font-ui);
      font-size: 16px;
      color: var(--danger);
    }

    /* ── Loading ───────────────────────────────────────────── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 64px 24px;
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-right-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: var(--font-ui);
      font-size: 14px;
      color: var(--muted);
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Math overrides ────────────────────────────────────── */
    .katex { font-size: 1em; }
    .katex-display { margin: 0; }

    /* ── Scrollbar ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="loader"></div>
    <div class="loading-text">Загружаю решение…</div>
  </div>
</div>

<script>
// ── Telegram init ──────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0d0f14');
  tg.setBackgroundColor('#0d0f14');
}

// ── Parse solution from URL ────────────────────────────────
function getPayload() {
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('data');
  if (!raw) return null;
  try {
    const json = atob(raw.replace(/-/g, '+').replace(/_/g, '/'));
    return JSON.parse(json);
  } catch { return null; }
}

// ── Render helpers ─────────────────────────────────────────
function escapeHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMath(el) {
  if (window.renderMathInElement) {
    renderMathInElement(el, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$',  right: '$',  display: false },
      ],
      throwOnError: false,
    });
  }
}

function subjectColor(subject = '') {
  const s = subject.toLowerCase();
  if (/мат|алгебр|геом/.test(s)) return '#6ee7b7';
  if (/физ/.test(s))             return '#38bdf8';
  if (/хим/.test(s))             return '#fb923c';
  if (/биол/.test(s))            return '#4ade80';
  if (/рус|лит|англ|язык/.test(s)) return '#c084fc';
  if (/истор|обществ/.test(s))   return '#fbbf24';
  return '#6ee7b7';
}

// ── Build UI ───────────────────────────────────────────────
function render(sol) {
  const color = subjectColor(sol.subject);
  document.documentElement.style.setProperty('--accent', color);

  const stepsHtml = (sol.steps || []).map((step, i) => {
    const formulaHtml = step.formula
      ? `<div class="step-formula">$${escapeHtml(step.formula)}$</div>`
      : '';
    return `
      <div class="step" style="animation-delay:${0.08 + i * 0.08}s">
        <div class="step-num">${step.n || i + 1}</div>
        <div class="step-body">
          <div class="step-text">${escapeHtml(step.text)}</div>
          ${formulaHtml}
        </div>
      </div>`;
  }).join('');

  const hintHtml = sol.hint
    ? `<div class="hint-card">
         <div class="hint-icon">💡</div>
         <div class="hint-text">${escapeHtml(sol.hint)}</div>
       </div>`
    : '';

  document.getElementById('app').innerHTML = `
    <header>
      <span class="subject-badge">${escapeHtml(sol.subject || 'ГДЗ')}</span>
      <h1>${escapeHtml(sol.title || 'Решение задачи')}</h1>
    </header>
    <main>
      <div class="section-label">Пошаговое решение</div>
      <div class="steps">${stepsHtml}</div>
      <div class="answer-card">
        <div class="section-label">Ответ</div>
        <div class="answer-value">${escapeHtml(sol.answer || '—')}</div>
      </div>
      ${hintHtml}
    </main>`;

  // Render math after DOM update
  requestAnimationFrame(() => renderMath(document.body));
}

function renderError(msg) {
  document.getElementById('app').innerHTML = `
    <main>
      <div class="error-box">
        <div class="error-icon">❌</div>
        <div class="error-text">${escapeHtml(msg)}</div>
      </div>
    </main>`;
}

// ── Entry point ────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Wait for KaTeX to load
  const tryRender = () => {
    const sol = getPayload();
    if (!sol) { renderError('Данные решения не найдены.'); return; }
    if (sol.error) { renderError(sol.error); return; }
    render(sol);
  };

  // Poll until KaTeX auto-render is available
  let attempts = 0;
  const poll = setInterval(() => {
    attempts++;
    if (window.renderMathInElement || attempts > 30) {
      clearInterval(poll);
      tryRender();
    }
  }, 100);
});
</script>
</body>
</html>

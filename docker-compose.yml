version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MINI_APP_URL: ${MINI_APP_URL}          # e.g. https://yourdomain.com/
    networks:
      - gdznet

  miniapp:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./miniapp:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment if using Let's Encrypt:
      # - ./certs:/etc/letsencrypt:ro
    networks:
      - gdznet

networks:
  gdznet:

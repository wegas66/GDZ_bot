version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - gdznet
    volumes:
      - ./:/app

  miniapp:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./miniapp:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment if using Let's Encrypt:
      # - ./certs:/etc/letsencrypt:ro
    networks:
      - gdznet

networks:
  gdznet:
